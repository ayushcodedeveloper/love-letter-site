<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Link Generator 💖</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  text-align: center;
  padding: 20px;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  max-width: 350px;
  margin: auto;
}

input, select {
  width: 90%;
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  width: 95%;
  background: #ff4d6d;
  color: white;
  border: none;
  border-radius: 8px;
}

.message {
  font-size: 22px;
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="box" id="formBox">
  <h2>💌 Create Message</h2>

  <input type="text" id="yourName" placeholder="Your Name">
  <input type="text" id="crushName" placeholder="Crush Name">

  <select id="type">
    <option value="love">Love ❤️</option>
    <option value="sorry">Sorry 🙏</option>
    <option value="miss">Miss You 😢</option>
  </select>

  <button onclick="generateLink()">Generate Link 🔗</button>

  <div id="linkBox"></div>
</div>

<div id="messagePage" style="display:none;">
  <h2>💖 Message</h2>
  <div class="message" id="msg"></div>
</div>

<script>
// Generate link
function generateLink() {
  let name = document.getElementById("yourName").value.trim();
  let crush = document.getElementById("crushName").value.trim();
  let type = document.getElementById("type").value;

  if(!name || !crush){
    alert("Please fill all fields!");
    return;
  }

  let link = `${window.location.href.split('?')[0]}?name=${encodeURIComponent(name)}&crush=${encodeURIComponent(crush)}&type=${type}`;

  document.getElementById("linkBox").innerHTML = `
    <p>Copy this link 👇</p>
    <input value="${link}" readonly onclick="this.select()">
  `;
}

// Show message
function showMessage() {
  let params = new URLSearchParams(window.location.search);

  let name = params.get("name");
  let crush = params.get("crush");
  let type = params.get("type");

  if(name && crush && type) {
    document.getElementById("formBox").style.display = "none";
    document.getElementById("messagePage").style.display = "block";

    let message = "";

    if(type === "love") {
      message = `❤️ ${crush}, ${name} tumse bahut pyar karta hai! ❤️`;
    } 
    else if(type === "sorry") {
      message = `🙏 ${crush}, ${name} tumse maafi mangta hai 😔`;
    } 
    else {
      message = `😢 ${crush}, ${name} tumhe bahut miss karta hai 💔`;
    }

    document.getElementById("msg").innerText = message;
  }
}

// Run on load
showMessage();
</script>

</body>
</html>
