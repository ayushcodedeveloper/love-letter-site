<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Message 💖</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  text-align: center;
  padding: 20px;
  overflow: hidden;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  max-width: 350px;
  margin: auto;
}

input, select {
  width: 90%;
  padding: 10px;
  margin: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  padding: 10px;
  width: 95%;
  background: #ff4d6d;
  color: white;
  border: none;
  border-radius: 8px;
}

.message {
  font-size: 22px;
  margin-top: 30px;
}

/* Balloons */
.balloon {
  position: absolute;
  bottom: -100px;
  font-size: 30px;
  animation: rise 6s linear infinite;
}

@keyframes rise {
  from { transform: translateY(0); }
  to { transform: translateY(-120vh); }
}
</style>
</head>

<body>

<div class="box" id="formBox">
  <h2>💌 Create Message</h2>

  <input type="text" id="yourName" placeholder="Your Name">
  <input type="text" id="crushName" placeholder="Crush Name">

  <select id="type">
    <option value="love">Love ❤️</option>
    <option value="sorry">Sorry 🙏</option>
    <option value="miss">Miss You 😢</option>
    <option value="bday">Birthday Wish 🎂</option>
  </select>

  <button onclick="generateLink()">Generate Link 🔗</button>

  <div id="linkBox"></div>
</div>

<div id="messagePage" style="display:none;">
  <h2>💖 Message</h2>
  <div class="message" id="msg"></div>
</div>

<script>
// Generate Link
function generateLink() {
  let name = document.getElementById("yourName").value;
  let crush = document.getElementById("crushName").value;
  let type = document.getElementById("type").value;

  let link = `${window.location.href.split('?')[0]}?name=${encodeURIComponent(name)}&crush=${encodeURIComponent(crush)}&type=${type}`;

  document.getElementById("linkBox").innerHTML = `
    <p>Copy & Share 👇</p>
    <input value="${link}" readonly onclick="this.select()">
  `;
}

// Show Message
function showMessage() {
  let params = new URLSearchParams(window.location.search);

  let name = params.get("name");
  let crush = params.get("crush");
  let type = params.get("type");

  if(name && crush && type) {
    document.getElementById("formBox").style.display = "none";
    document.getElementById("messagePage").style.display = "block";

    let message = "";

    if(type === "love") {
      message = `❤️ ${crush}, ${name} tumse bahut pyar karta hai! ❤️`;
    } 
    else if(type === "sorry") {
      message = `🙏 ${crush}, ${name} tumse maafi mangta hai 😔`;
    } 
    else if(type === "miss") {
      message = `😢 ${crush}, ${name} tumhe bahut miss karta hai 💔`;
    }
    else if(type === "bday") {
      message = `🎂 Happy Birthday ${crush}! 🎉\n\n${name} ki taraf se dher saari badhaiyaan 💖`;
      startBirthdayAnimation();
    }

    document.getElementById("msg").innerText = message;
  }
}

// Birthday Animation 🎈
function startBirthdayAnimation() {
  for(let i=0;i<20;i++){
    let b = document.createElement("div");
    b.className = "balloon";
    b.innerText = "🎈";
    b.style.left = Math.random()*100 + "vw";
    b.style.animationDuration = (4 + Math.random()*3) + "s";
    document.body.appendChild(b);

    setTimeout(()=>b.remove(),7000);
  }
}

// Run
showMessage();
</script>

</body>
</html>
